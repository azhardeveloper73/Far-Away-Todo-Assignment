<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180">
  <defs>
    <pattern id="stripe" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent"/>
      <rect width="4" height="8" fill="#4a2c1a"/>
    </pattern>
  </defs>

  <text
    x="50%"
    y="68%"
    text-anchor="middle"
